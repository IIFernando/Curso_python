<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f2f5;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #response {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p>Clique no botão abaixo para chamar a API:</p>
    <button onclick="chamarAPI()">Chamar API</button>
    <div id="response"></div>

    <script>
        async function chamarAPI() {
            const res = await fetch('/api/hello');
            const data = await res.json();
            document.getElementById('response').innerText = data.message;
        }
    </script>
</body>
</html>
